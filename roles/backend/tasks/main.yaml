- name: configure backend server
  hosts: backend
  become: yes
  tasks:
  - name: disable current nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name:  enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y

# we need to install scheme of mysql 
  - name: install nodejs
    ansible.builtin.package:
     name: "{{item}}"
     state: present 
    loop:
    - nodejs
    - mysql

  - name: create expense user
    ansible.builtin.user:
     name: expense   

  - name: create app directory (file)
    ansible.builtin.file:
     path: /app
     state: directory

  - name:  download backend code (url)
    ansible.builtin.get_url:
     url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip   
     dest: /tmp/backend.zip

  - name: unzip backend code
    ansible.builtin.unarchive:
     src: /tmp/backend.zip
     dest: /app 
     remote_src: yes

  - name: Install dependencies
    community.general.npm:
      path: /app

    # ansible copy file  contol mission or not remote mission 
  - name: copy backend service
    ansible.builtin.template:
     src: backend.service.js
     dest: /etc/systemd/system/backend.service

  - name: install pthyon libs
    ansible.builtin.pip:
      name: "{{ item }}"
      executable: pip3.9
    loop:
    - cryptography
    - PyMySQL  

  - name: import mysql data
    community.mysql.mysql_db:
     state: import
     name: all
     login_user: "{{ login_user }}"
     # root
     login_password: "{{ login_password }}"
     #ExpenseApp@1
     login_host: "{{ login_hosts }}"
     #mysql.vinaydevops.fun 
     target: /app/schema/backend.sql 

  - name: daemon reload and restart service
    ansible.builtin.systemd_service:
     enabled: true
     state: restarted
     daemon_reload: true
     name: backend




